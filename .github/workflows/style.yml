name: Code Style

on: [pull_request, workflow_dispatch]

permissions:
   contents: read

jobs:
  formatting:
    name: CMake

    runs-on: "ubuntu-latest"

    env:
      UV_FROZEN: true

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        prune-cache: false
        python-version: '3.14'

    - name: Install dependencies
      run: |
        uv sync --group format --group types

    - name: Check types
      run: uv run mypy python

    - name: Clang Format
      run: uv run ./script/clang-format --check

    - name: CMake Format
      run: |
        find . -name 'CMakeLists.txt' -o -name '*.cmake' > cmake-src
        xargs uv run cmake-format --check < cmake-src

    - name: pre-commit hooks
      run: |
        SKIP=no-commit-to-branch uv run pre-commit run --all-files --show-diff-on-failure
